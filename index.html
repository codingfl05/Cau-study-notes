<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study Notes</title>
<style>
:root {
  --bg-primary: #ffffff;
  --bg-secondary: #f5f4f0;
  --bg-tertiary: #eeedea;
  --bg-info: #eaf2fc;
  --text-primary: #1a1a18;
  --text-secondary: #5c5c56;
  --text-info: #185fa5;
  --border-secondary: rgba(0,0,0,0.14);
  --border-info: #b5d4f4;
  --radius-md: 8px;
  --radius-lg: 12px;
  --font-sans: system-ui, -apple-system, sans-serif;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg-primary: #1e1e1c;
    --bg-secondary: #262624;
    --bg-tertiary: #2e2e2c;
    --bg-info: #0c2a4a;
    --text-primary: #e8e7e0;
    --text-secondary: #a0a098;
    --text-info: #5ba0e8;
    --border-secondary: rgba(255,255,255,0.14);
    --border-info: #1a4a7a;
  }
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--font-sans);
  background: var(--bg-secondary);
  color: var(--text-primary);
  min-height: 100vh;
}
.site-header {
  background: var(--bg-primary);
  border-bottom: 0.5px solid var(--border-secondary);
  padding: 1rem 1.5rem;
}
.site-header h1 { font-size: 1.3rem; font-weight: 800; }
.site-header p  { color: var(--text-secondary); font-size: 0.85rem; margin-top: 0.2rem; }
.content { max-width: 860px; margin: 0 auto; padding: 1.5rem 1.25rem 4rem; }
.subject-card {
  background: var(--bg-primary);
  border: 0.5px solid var(--border-secondary);
  border-radius: var(--radius-lg);
  padding: 1rem 1.25rem;
  margin-bottom: 1rem;
}
.subject-title {
  font-size: 1rem; font-weight: 700;
  margin-bottom: 0.6rem;
}
.week-links { display: flex; flex-wrap: wrap; gap: 0.4rem; }
.week-link {
  display: inline-block;
  background: var(--bg-info);
  color: var(--text-info);
  border: 0.5px solid var(--border-info);
  border-radius: 99px;
  padding: 0.2rem 0.75rem;
  font-size: 0.78rem; font-weight: 600;
  text-decoration: none;
  transition: opacity 0.15s;
}
.week-link:hover { opacity: 0.75; }
.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
@media (max-width: 600px) { .grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<header class="site-header">
  <h1>📚 Study Notes</h1>
  <p>Click a week to open the notes for that week.</p>
</header>

<div class="content">
  <div class="grid">

    <!-- Data Structures -->
    <div class="subject-card">
      <div class="subject-title">🗂 Data Structures</div>
      <div class="week-links">
        <a class="week-link" href="ds-week1.html">Week 1</a>
        <a class="week-link" href="ds-week2.html">Week 2</a>
        <a class="week-link" href="ds-week3.html">Week 3</a>
        <a class="week-link" href="ds-week4.html">Week 4 ✨</a>
      </div>
    </div>

    <!-- Numerical Analysis -->
    <div class="subject-card">
      <div class="subject-title">📐 Numerical Analysis</div>
      <div class="week-links">
        <a class="week-link" href="na-week1.html">Week 1</a>
        <a class="week-link" href="na-week2.html">Week 2</a>
        <a class="week-link" href="na-week3.html">Week 3</a>
      </div>
    </div>

    <!-- Probability -->
    <div class="subject-card">
      <div class="subject-title">🎲 Probability</div>
      <div class="week-links">
        <a class="week-link" href="prob-week1.html">Week 1</a>
        <a class="week-link" href="prob-week2.html">Week 2</a>
        <a class="week-link" href="prob-week3.html">Week 3</a>
      </div>
    </div>

    <!-- Computer Graphics -->
    <div class="subject-card">
      <div class="subject-title">🎨 Computer Graphics</div>
      <div class="week-links">
        <a class="week-link" href="cg-week1.html">Week 1</a>
        <a class="week-link" href="cg-week2.html">Week 2</a>
      </div>
    </div>

    <!-- Korean History -->
    <div class="subject-card">
      <div class="subject-title">🏯 Korean History</div>
      <div class="week-links">
        <a class="week-link" href="hist-week1.html">Week 1</a>
        <a class="week-link" href="hist-week2.html">Week 2</a>
      </div>
    </div>

  </div>
</div>

</body>
</html>
